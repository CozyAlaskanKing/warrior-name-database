<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
      padding: 40px;
      margin: 0;
    }
    nav {
      background: #2b2b2b;
      padding: 15px;
      margin-bottom: 30px;
      border-radius: 8px;
    }
    nav a {
      color: #f0f0f0;
      text-decoration: none;
      margin-right: 20px;
      font-weight: bold;
      font-size: 16px;
    }
    nav a:hover {
      text-decoration: underline;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    #generator {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background: #2b2b2b;
      border-radius: 10px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
      justify-content: center;
    }
    .tags label {
      background: #444;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .tags input[type="checkbox"] {
      display: none;
    }
    .tags input[type="checkbox"]:checked + span {
      background: #4CAF50;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
    }
    button {
      display: block;
      margin: 15px auto 0;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #154d17;
      color: white;
    }
    button:hover {
      background: #45a049;
    }
    input[type="text"] {
      padding: 5px 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #555;
      width: 120px;
      background: #333;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Name Generator</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="name-generator.html">Name Generator</a>
    <a href="name-submission.html">Submit a Name</a>
  </nav>

  <div id="generator">
    <div style="display:flex; gap:10px; margin-bottom:15px; justify-content:center;">
      <div>
        <input id="prefixInput" placeholder="Prefix (optional)">
        <button id="lockPrefix">🔓</button>
      </div>
      <div>
        <input id="suffixInput" placeholder="Suffix (optional)">
        <button id="lockSuffix">🔓</button>
      </div>
    </div>

    <div class="tags" id="tag-filters"></div>

    <button id="generateBtn">Generate Name</button>
  </div>

  <script>
    let names = [];
    const allTags = new Set();

    let lockedPrefix = false;
    let lockedSuffix = false;
    let currentPrefix = "";
    let currentSuffix = "";

    fetch('names.json')
      .then(res => res.json())
      .then(data => {
        names = data;
        populateTagFilters();
      });

    function populateTagFilters() {
      const container = document.getElementById('tag-filters');
      names.forEach(n => n.tags.forEach(tag => allTags.add(tag)));
      Array.from(allTags).sort().forEach(tag => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" value="${tag}"><span>${tag}</span>`;
        container.appendChild(label);
      });
    }

    function getSelectedTags() {
      return Array.from(document.querySelectorAll('#tag-filters input[type="checkbox"]'))
                  .filter(cb => cb.checked)
                  .map(cb => cb.value);
    }

    function getFilteredLists(selectedTags) {
      const filtered = selectedTags.length
        ? names.filter(n => n.tags.some(tag => selectedTags.includes(tag)))
        : names;

      return {
        prefixes: filtered.filter(n => n.type === 'prefix' || n.type === 'both'),
        suffixes: filtered.filter(n => n.type === 'suffix' || n.type === 'both')
      };
    }

    function generateName(selectedTags = []) {
      const { prefixes, suffixes } = getFilteredLists(selectedTags);
      if (!prefixes.length || !suffixes.length) return "No valid names!";

      // PREFIX
      if (!lockedPrefix) {
        const prefixInput = document.getElementById("prefixInput");
        currentPrefix = prefixInput.value.trim() || prefixes[Math.floor(Math.random() * prefixes.length)].name;
        prefixInput.value = currentPrefix;
      }

      // SUFFIX
      if (!lockedSuffix) {
        const suffixInput = document.getElementById("suffixInput");
        currentSuffix = suffixInput.value.trim() || suffixes[Math.floor(Math.random() * suffixes.length)].name;
        suffixInput.value = currentSuffix;
      }
    }

    document.getElementById("generateBtn").onclick = function() {
      const selectedTags = getSelectedTags();
      generateName(selectedTags);
    };

    document.getElementById("lockPrefix").onclick = function() {
      lockedPrefix = !lockedPrefix;
      this.textContent = lockedPrefix ? "🔒" : "🔓";
    };

    document.getElementById("lockSuffix").onclick = function() {
      lockedSuffix = !lockedSuffix;
      this.textContent = lockedSuffix ? "🔒" : "🔓";
    };
  </script>

</body>
</html>
