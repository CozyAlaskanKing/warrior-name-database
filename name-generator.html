<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Generator</title>
  <style>
    /* General page styling */
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
      padding: 40px;
      margin: 0;
    }

    /* Navigation styling */
    nav {
      background: #2b2b2b;
      padding: 15px;
      margin-bottom: 30px;
      border-radius: 8px;
    }
    nav a {
      color: #f0f0f0;
      text-decoration: none;
      margin-right: 20px;
      font-weight: bold;
      font-size: 16px;
    }
    nav a:hover {
      text-decoration: underline;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Generator container */
    #generator {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background: #2b2b2b;
      border-radius: 10px;
    }

    /* Tag checkboxes styling */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }
    .tags label {
      background: #444;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .tags input[type="checkbox"] {
      display: none;
    }
    .tags input[type="checkbox"]:checked + span {
      background: #4CAF50;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
    }

    /* Button styling */
    button {
      display: block;
      margin: 0 auto;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #154d17;
      color: white;
    }
    button:hover {
      background: #45a049;
    }

    /* Result styling */
    #result {
      font-size: 1.5em;
      font-weight: bold;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Name Generator</h1>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="name-generator.html">Name Generator</a>
    <a href="name-submission.html">Submit a Name</a>
  </nav>

  <div id="generator">
    <div class="tags" id="tag-filters">
      <!-- Tag checkboxes will populate here -->
    </div>

    <button onclick="showName()">Generate Name</button>
    <p id="result">Your name will appear here!</p>
  </div>

  <script>
    let names = [];
    const allTags = new Set();

    // Load names JSON
    fetch('names.json')
      .then(res => res.json())
      .then(data => {
        names = data;
        populateTagFilters();
      });

    // Populate the tag filter checkboxes
    function populateTagFilters() {
      const container = document.getElementById('tag-filters');
      names.forEach(n => n.tags.forEach(tag => allTags.add(tag)));
      Array.from(allTags).sort().forEach(tag => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" value="${tag}"><span>${tag}</span>`;
        container.appendChild(label);
      });
    }

    // Get selected tags
    function getSelectedTags() {
      const checkboxes = document.querySelectorAll('#tag-filters input[type="checkbox"]');
      return Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
    }

    // Generate a name
    function generateName(selectedTags = []) {
      const filtered = selectedTags.length
        ? names.filter(n => n.tags.some(tag => selectedTags.includes(tag)))
        : names;

      const prefixes = filtered.filter(n => n.type === 'prefix' || n.type === 'both');
      const suffixes = filtered.filter(n => n.type === 'suffix' || n.type === 'both');

      if (!prefixes.length || !suffixes.length) return "No valid names!";

      const prefix = prefixes[Math.floor(Math.random() * prefixes.length)].name;
      const suffix = suffixes[Math.floor(Math.random() * suffixes.length)].name;

      return prefix + suffix;
    }

    // Show the generated name
    function showName() {
      const selectedTags = getSelectedTags();
      const name = generateName(selectedTags);
      document.getElementById('result').textContent = name;
    }
  </script>

</body>
</html>
