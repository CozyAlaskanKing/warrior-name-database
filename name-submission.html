<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggest a Name</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1e1e1e;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      background-color: #4CAF50; /* or match your site color */
      color: white;
      width: 100%;
      padding: 20px 0;
      text-align: center;
      font-size: 1.8em;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    main {
      flex: 1;
      width: 90%;
      max-width: 800px;
      margin: 40px 0;
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 900px;
      border: none;
    }

    p {
      font-size: 1.1em;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <header>Suggest a Name</header>
  <main>
    <p>Have an idea for a new name? Fill out the form below and I’ll review it!</p>
    <iframe src="https://forms.gle/QGK2vwD59fXt5BRS8">Loading…</iframe>
  </main>
</body>
</html>
