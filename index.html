<!DOCTYPE html>
<html>
<head>
<title>Warrior Name Archive</title>
<style>
/* General page styling */
body{
  font-family: Arial, sans-serif;
  background:#1e1e1e;
  color:white;
  padding:40px;
  margin:0;
}

/* Navigation styling */
nav {
  background: #2b2b2b;
  padding: 15px;
  margin-bottom: 30px;
  border-radius: 8px;
}
nav a {
  color: #f0f0f0;
  text-decoration: none;
  margin-right: 20px;
  font-weight: bold;
  font-size: 16px;
}
nav a:hover {
  text-decoration: underline;
}

/* Search and filter styling */
input, select {
  padding: 8px;
  margin: 5px 0;
  border-radius: 4px;
  border: none;
  font-size: 14px;
}
#tagFilters label{
  display:inline-block;
  margin-right:10px;
  cursor:pointer;
  font-size: 14px;
}

/* Name results styling */
.name{
  padding:10px;
  border-bottom:1px solid #444;
  font-size: 16px;
}

/* Section headers */
h1, h2 {
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h1>Warrior Name Archive</h1>

<!-- Navigation -->
<nav>
  <a href="index.html">Home</a>
  <a href="name-generator.html">Name Generator</a>
  <a href="name-search.html">Name Search</a>
  <a href="name-submission.html">Submit a Name</a>
</nav>

<!-- Search input -->
<input id="searchBox" placeholder="Search names...">

<!-- Type filter -->
<select id="typeFilter">
  <option value="">All</option>
  <option value="prefix">Prefix</option>
  <option value="suffix">Suffix</option>
  <option value="both">Prefix/Suffix</option>
</select>

<!-- Tag checkboxes -->
<h2>Filter by tag:</h2>
<div id="tagFilters">
  <label><input type="checkbox" value="red"> Red</label>
  <label><input type="checkbox" value="orange"> Orange</label>
  <label><input type="checkbox" value="yellow"> Yellow</label>
  <label><input type="checkbox" value="green"> Green</label>
  <label><input type="checkbox" value="blue"> Blue</label>
  <label><input type="checkbox" value="white"> White</label>
  <label><input type="checkbox" value="gray"> Gray</label>
  <label><input type="checkbox" value="black"> Black</label>
  <label><input type="checkbox" value="brown"> Brown</label>
  <label><input type="checkbox" value="physical"> Physical</label>
  <label><input type="checkbox" value="personality"> Personality</label>
  <label><input type="checkbox" value="animal"> Animal</label>
  <label><input type="checkbox" value="bird"> Bird</label>
  <label><input type="checkbox" value="insect"> Insect</label>
  <label><input type="checkbox" value="plant"> Plant</label>
  <label><input type="checkbox" value="tree"> Tree</label>
  <label><input type="checkbox" value="fish"> Fish</label>
</div>

<!-- Names results -->
<div id="results"></div>

<script>
let names = [];

// Helper: capitalize first letter of each word
function capitalizeWords(str){
  return str.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(" ");
}

// Display names in archive
function displayNames(list){
  let results = document.getElementById("results");
  results.innerHTML = "";
  list.forEach(n => {
    results.innerHTML += `<div class="name">${capitalizeWords(n.name)}</div>`;
  });
}

// Filter function
function filterNames(){
  let search = document.getElementById("searchBox").value.toLowerCase();
  let type = document.getElementById("typeFilter").value;
  let selectedTags = Array.from(document.querySelectorAll("#tagFilters input:checked")).map(e => e.value);

  let filtered = names.filter(n => {
    let matchesSearch = n.name.toLowerCase().includes(search);
    let matchesType = !type || n.type === type || n.type === "both";
    let matchesTag = selectedTags.length === 0 || n.tags.some(t => selectedTags.includes(t));
    return matchesSearch && matchesType && matchesTag;
  });

  displayNames(filtered);
}

// Load names from JSON
fetch("names.json")
  .then(response => response.json())
  .then(data => {
    names = data;
    displayNames(names);

    // Attach listeners
    document.getElementById("searchBox").addEventListener("input", filterNames);
    document.getElementById("typeFilter").addEventListener("change", filterNames);
    document.querySelectorAll("#tagFilters input").forEach(el => el.addEventListener("change", filterNames));
  });
</script>
</body>
</html>
